<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas Project - News Verifier</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 30px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #333; }
        input { width: 90%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* Verify Button Style */
        .verify-btn { padding: 12px 30px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .verify-btn:hover { background-color: #0056b3; }

        /* Status Indicator (Gola) */
        #statusCircle { 
            width: 80px; height: 80px; border-radius: 50%; 
            margin: 25px auto; display: none; 
            border: 5px solid #fff;
        }
        
        /* Red and Green Classes */
        .red-status { background-color: #ff4d4d; box-shadow: 0 0 20px #ff4d4d; }
        .green-status { background-color: #2ecc71; box-shadow: 0 0 20px #2ecc71; }
        
        #resultMessage { margin-top: 15px; font-size: 18px; font-weight: 600; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Veritas News Verifier</h2>
    <p>Paste news link to check authenticity</p>
    
    <input type="text" id="newsUrl" placeholder="https://example.com/news-link">
    <br>
    <button class="verify-btn" onclick="checkNews()">Verify Now</button>

    <div id="statusCircle"></div>
    <p id="resultMessage"></p>
</div>

<script>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
    function checkNews() {
        const urlInput = document.getElementById('newsUrl').value;
        const circle = document.getElementById('statusCircle');
        const message = document.getElementById('resultMessage');

        if (!urlInput) {
            alert("Bhai, pehle link toh daal do!");
            return;
        }

        message.innerText = "Checking news sources...";
        circle.style.display = "none";

        // YAAD RAKHO: Niche wala IP apne 'hostname -I' se check kar lena                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
        fetch('https://veritasproject.onrender.com/verify                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ',{
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: urlInput })
        })
        .then(response => response.json())
        .then(data => {
            circle.style.display = "block";
            message.innerText = data.message;
            
            // Backend se aane wale 'color' ke hisaab se class set hogi
            if (data.color === 'green') {
                circle.className = 'green-status';
            } else {
                circle.className = 'red-status';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            message.innerText = "Connection Failed! Is Backend running?";
        });
    }
</script>

</body>
</html>
